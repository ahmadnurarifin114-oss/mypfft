    <script>
        // 1. Jalankan fungsi pas user ngeklik thumbnail video (Buka Modal)
        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href');
                if (targetId && targetId.startsWith('#modal')) {
                    const modal = document.querySelector(targetId);
                    const iframe = modal ? modal.querySelector('iframe') : null;
                    
                    if (iframe) {
                        let src = iframe.src;
                        // Tambah parameter autoplay hanya saat tombol diklik
                        if (!src.includes('autoplay=1')) {
                            src += src.includes('?') ? '&autoplay=1' : '?autoplay=1';
                            iframe.src = src;
                        }
                    }
                }
            });
        });

        // 2. Jalankan fungsi pas modal ditutup (Matikan Video + Suara)
        document.querySelectorAll('.modal-close, .modal-backdrop').forEach(trigger => {
            trigger.addEventListener('click', function() {
                const activeModal = this.closest('.modal');
                if (activeModal) {
                    const iframe = activeModal.querySelector('iframe');
                    if (iframe) {
                        // Bersihkan parameter autoplay dan reset src agar berhenti total
                        let src = iframe.src.replace(/[?&]autoplay=1/, '');
                        iframe.src = '';
                        iframe.src = src;
                    }
                }
            });
        });
    </script>
