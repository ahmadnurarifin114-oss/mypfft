<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portfolio - awis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        header {
            position: absolute;
            top: 30px;
            right: 40px;
        }

        .home-link {
            font-size: 13px;
            letter-spacing: 2px;
            color: #aaa;
            position: relative;
            z-index: 1001;
        }

        .home-link:hover {
            color: #fff;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .main-container::after {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            width: 150px;
            height: 100%;
            background: linear-gradient(to left, #0d0d0d, transparent);
            pointer-events: none;
        }

        .slider-track {
            display: flex;
            gap: 30px;
            padding-left: 80px;
            padding-right: 220px;
            overflow-x: auto;
            scroll-behavior: smooth;
            cursor: grab;
            scroll-snap-type: x mandatory;
            scroll-padding-left: 80px;
        }

        .slider-track::-webkit-scrollbar {
            display: none;
        }

        .video-item {
            min-width: 320px;
            flex-shrink: 0;
            scroll-snap-align: start;
        }

        .video-container {
            width: 100%;
            height: 380px;
            overflow: hidden;
            border-radius: 12px;
            background: #1a1a1a;
        }

        .video-gif {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .video-container:hover .video-gif {
            transform: scale(1.08);
        }

        .video-title {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .view-more-container {
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #444;
            border-radius: 12px;
            color: #aaa;
        }

        .view-more-container:hover {
            border-color: #fff;
            background: #1a1a1a;
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #555;
        }

        /* =========================================
           TAMBAHAN CSS KHUSUS UNTUK MODAL (VIDEO BESAR)
           ========================================= */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; /* Z-index tinggi biar di atas layar & header */
            left: 0;
            top: 0;
            width: 100vw; 
            height: 100vh; 
            background-color: rgba(0, 0, 0, 0.9); /* Latar lebih gelap biar sinematik */
            backdrop-filter: blur(5px); /* Efek blur di background */
            justify-content: center; 
            align-items: center; 
        }

        .modal-content {
            width: 80%; 
            max-width: 1000px; 
            position: relative;
        }

        .close-btn {
            position: absolute;
            right: -40px; 
            top: -40px; 
            color: white;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            z-index: 10000;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #ff4444; 
        }

        .modal-content iframe {
            width: 100%;
            aspect-ratio: 16 / 9; 
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <nav class="top-nav">
            <a href="index.html" class="home-link">Home</a>

    </header>

    <main class="main-container">

                        <img src="mqdefault_6s (1).webp" alt="preview" class="video-gif">

            <div class="video-item">
                <div class="video-container">
                    <a href="https://youtu.be/0AVLaj41Zh8?si=wOJU-fnJouUQeoQa" target="_blank">
                        <img src="mqdefault_6s(3).webp" alt="preview" class="video-gif">

            <div class="video-item view-more">

                            <svg class="youtube-logo" viewBox="0 0 576 512" width="40"><path fill="currentColor" d="M549.655 124.083c-6.281-23.65-24.787-42.276-48.284-48.597C458.781 64 288 64 288 64S117.22 64 74.629 75.486c-23.497 6.322-42.003 24.947-48.284 48.597-11.412 42.867-11.412 132.305-11.412 132.305s0 89.438 11.412 132.305c6.281 23.65 24.787 41.5 48.284 47.821C117.22 448 288 448 288 448s170.78 0 213.371-11.486c23.497-6.321 42.003-24.171 48.284-47.821 11.412-42.867 11.412-132.305 11.412-132.305s0-89.438-11.412-132.305zm-317.51 213.508V175.185l142.739 81.205-142.739 81.201z"></path></svg>
                        </div>
                    </div>
                </a>
                <span class="video-number"></span>
            </div>

        </div>
    </main>

    <footer>
        <div class="footer-center">Share</div>
        <div class="footer-right">@Awiss</div>
    </footer>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <iframe src="" id="modal-iframe" allow="autoplay" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function openModal(drivePreviewUrl) {
            var modal = document.getElementById("video-modal");
            var iframe = document.getElementById("modal-iframe");
            modal.style.display = "flex";
            iframe.src = drivePreviewUrl;
        }

        function closeModal() {
            var modal = document.getElementById("video-modal");
            var iframe = document.getElementById("modal-iframe");
            modal.style.display = "none";
            iframe.src = ""; // Stop video play
        }

        // Kalau pengunjung klik di area luar video besar, modal ikut ketutup
        window.onclick = function(event) {
            var modal = document.getElementById("video-modal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
